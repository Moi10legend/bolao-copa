version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: bolao_copa_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: bolaosecretpass
      POSTGRES_DB: bolao_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: