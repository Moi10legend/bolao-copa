services:
  db:
    image: postgres:15-alpine
    container_name: bolao_copa_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: bolaosecretpass
      POSTGRES_DB: bolao_db
    ports:
      - "5432:5432"
    volumes:
      - bolao_pg_data:/var/lib/postgresql/data  # <-- Nome alterado aqui

volumes:
  bolao_pg_data:  # <-- E nome alterado aqui